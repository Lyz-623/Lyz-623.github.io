research:
  - title: Optical Microscopy
    body: Designing and using microscopy systems to capture rich spatial and spectral information from biological samples.
  - title: Computational Reconstruction
    body: Combining optics, signal processing, and learning-based methods to improve image quality and extract quantitative measurements.
  - title: Biomedical Imaging Analysis
    body: Applying hyperspectral and microscopic image analysis to pathology and tissue-level biomedical questions.
